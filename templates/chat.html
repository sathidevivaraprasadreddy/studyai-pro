{% extends "base.html" %}

{% block title %}
Chat
{% endblock %}

{% block content %}

<h2>Ask StudyAI</h2>

<form method="POST">

    <div class="mb-3">

        <textarea
            class="form-control"
            name="question"
            rows="4"
            required></textarea>

    </div>

    <button class="btn btn-primary">
        Ask
    </button>

</form>

{% if answer %}

<hr>

<h4>Answer</h4>

<pre>{{ answer }}</pre>

{% endif %}

{% endblock %}
