<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}StudyAI Pro{% endblock %}</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .navbar-brand{
            font-weight:bold;
        }

        .container-box{
            background:white;
            padding:30px;
            border-radius:15px;
            margin-top:30px;
            box-shadow:0 0 15px rgba(0,0,0,0.08);
        }

        pre{
            white-space:pre-wrap;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand"
           href="/">
           StudyAI Pro
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">Home</a>

            <a class="nav-link" href="/upload" target="_blank">Upload</a>

            <a class="nav-link" href="/chat" target="_blank">Chat</a>

            <a class="nav-link" href="/quiz" target="_blank">Quiz</a>

            <a class="nav-link" href="/flashcards" target="_blank">Flashcards</a>

            <a class="nav-link" href="/notes" target="_blank">Notes</a>

            <a class="nav-link" href="/assessment" target="_blank">Assessment</a>

            <a class="nav-link" href="/roadmap" target="_blank">Roadmap</a>

            <a class="nav-link" href="/dashboard" target="_blank">Dashboard</a>

        </div>

    </div>

</nav>

<div class="container">

    <div class="container-box">
{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <script>
                alert("{{ message }}");
            </script>
        {% endfor %}
    {% endif %}
{% endwith %}
        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
