{% extends "base.html" %}

{% block title %}
Upload
{% endblock %}

{% block content %}

<h2>Upload Study Material</h2>

<form method="POST"
      enctype="multipart/form-data">

    <div class="mb-3">

        <input
            class="form-control"
            type="file"
            name="file"
            required>

    </div>

    <button class="btn btn-success">
        Upload
    </button>

</form>

{% endblock %}
